services:
  database:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  back-end:
    build:
      context: ./back-end
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - ./back-end/.env
    environment:
      DATABASE_URL: postgres://postgres:postgres@database:5432/todos
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./back-end/Cargo.toml:/app/Cargo.toml
      - ./back-end/Cargo.lock:/app/Cargo.lock
      - ./back-end/src:/app/src
      - ./back-end/migrations:/app/migrations
      - cargo-registry:/usr/local/cargo/registry
      - target-cache:/app/target

  front-end:
    build:
      context: ./front-end
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    volumes:
      - ./front-end/src:/app/src
      - ./front-end/static:/app/static
      - ./front-end/svelte.config.js:/app/svelte.config.js
      - ./front-end/vite.config.ts:/app/vite.config.ts
      - ./front-end/tsconfig.json:/app/tsconfig.json
      - ./front-end/orval.config.ts:/app/orval.config.ts
    depends_on:
      - back-end

volumes:
  postgres-data:
  cargo-registry:
  target-cache:
